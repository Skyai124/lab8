name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore lab8.sln

      - name: Build solution
        run: dotnet build lab8.sln --configuration Release --no-restore -p:UseAppHost=false

      - name: Run MSTest suite
        run: dotnet test lab8.Tests/lab8.Tests.csproj --configuration Release --no-build --logger trx
